<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برای النا</title>
    <style>
        body {
            background: #ffe6f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Tahoma, sans-serif;
            direction: rtl;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);

            max-width: 400px;
        }
        h1 {
            color: #d6336c;
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        img {
            max-width: 100%;
            border-radius: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>💖 دوست دارم النا 💖</h1>
    <img src="https://i.pinimg.com/736x/1b/6c/c7/1b6cc755f6893dd00a229bccd07ab043.jpg" alt="عکس النا">
</div>

</body>
</html>
