<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ممد رضا - وبسایت شخصی</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: #f0f0f0;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #222;
        }
        p {
            color: #555;
            line-height: 2;
        }
        .link {
            display: inline-block;
            background: #0077ff;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            text-decoration: none;
            margin: 5px;
        }
        .link:hover {
            background: #0055cc;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>👋 سلام! من ممد رضا هستم</h1>
    <p>
        این وبسایت شخصی منه.<br>
        به زودی نمونه‌کارها و نوشته‌های من اینجا قرار می‌گیره.
    </p>
    <p>
        <a href="#" class="link">گیت‌هاب</a>
        <a href="#" class="link">تلگرام</a>
    </p>
</div>

</body>
</html>
